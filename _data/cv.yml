        highlights:
          - "Led the design and development of advanced Retrieval-Augmented Generation (RAG) systems for upstream operations in oil and gas, handling structured and unstructured data to deliver context-aware responses."
          - "Optimized the RAG pipeline using Azure Document Intelligence for PDF parsing and dynamic semantic chunking, minimising context loss."
