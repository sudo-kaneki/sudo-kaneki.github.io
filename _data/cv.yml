        highlights:
          - "Increased call transcription accuracy by analysing audio data to identify language, informing tailored transcription and summarisation strategies."
          - "Developed a complete audio processing pipeline using VAD for noise reduction, Mel-Spectrogram features, and a TDNN-based language identification tool."
          - "Fine-tuned the Whisper model with hyper-parameter tuning specifically for Indian languages, significantly improving transcription fidelity."
          - "Engineered a QA module to flag recurring lines and timestamp discrepancies; leveraged GPT-3.5 and XLM-RoBERTa for business category classification of transcripts."

